name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [release, debug, no-net]
        include:
          - build: release
            make_args: ""
          - build: debug
            make_args: "DEBUG=1"
          - build: no-net
            make_args: "NOVA_NO_NET=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install libcurl (release/debug only)
        if: matrix.build != 'no-net'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build (${{ matrix.build }})
        id: build
        continue-on-error: true
        run: set -o pipefail && make ${{ matrix.make_args }} 2>&1 | tee build.log

      - name: Report build errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors (${{ matrix.build }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' build.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Build tools
        if: steps.build.outcome == 'success'
        id: build_tools
        continue-on-error: true
        run: set -o pipefail && make tools ${{ matrix.make_args }} 2>&1 | tee tools.log

      - name: Report tools build errors
        if: steps.build_tools.outcome == 'failure'
        run: |
          echo "## Tools Build Errors (${{ matrix.build }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 tools.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' tools.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Test
        if: steps.build.outcome == 'success'
        run: |
          FAILED=""
          SKIP_NET=""
          SKIP_ASAN=""
          if [ "${{ matrix.build }}" = "no-net" ]; then SKIP_NET=1; fi
          if [ "${{ matrix.build }}" = "debug" ]; then SKIP_ASAN=1; fi
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_net.n)
                if [ -n "$SKIP_NET" ]; then
                  echo "SKIP $f (no-net build)"
                  continue
                fi ;;
              tests/test_bench_nanbox.n|tests/test_package.n|tests/test_require.n)
                if [ -n "$SKIP_ASAN" ]; then
                  echo "SKIP $f (known ASAN issue)"
                  continue
                fi ;;
            esac
            echo "=== $f ==="
            if ! ./bin/nova "$f" > /tmp/test_out.txt 2>&1; then
              echo "::error::FAIL: $f"
              echo "FAIL: $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -20 /tmp/test_out.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat /tmp/test_out.txt
              FAILED="$FAILED $f"
            else
              cat /tmp/test_out.txt
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Tests failed:$FAILED"
            exit 1
          fi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        id: build
        continue-on-error: true
        run: set -o pipefail && make CC=clang NOVA_NO_NET=1 2>&1 | tee build.log

      - name: Report build errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors (macOS)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' build.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Build tools
        if: steps.build.outcome == 'success'
        id: build_tools
        continue-on-error: true
        run: set -o pipefail && make tools CC=clang NOVA_NO_NET=1 2>&1 | tee tools.log

      - name: Report tools build errors
        if: steps.build_tools.outcome == 'failure'
        run: |
          echo "## Tools Build Errors (macOS)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 tools.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' tools.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Test (skip net + platform-specific)
        if: steps.build.outcome == 'success'
        run: |
          FAILED=""
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_net.n) echo "SKIP $f (no-net build)"; continue ;;
              tests/test_bench_nanbox.n|tests/test_bench_intern.n) echo "SKIP $f (known heap-use-after-free)"; continue ;;
              tests/test_os.n) echo "SKIP $f (platform-specific: expects Linux paths)"; continue ;;
            esac
            echo "=== $f ==="
            if ! ./bin/nova "$f" > /tmp/test_out.txt 2>&1; then
              echo "::error::FAIL: $f"
              echo "FAIL: $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -20 /tmp/test_out.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat /tmp/test_out.txt
              FAILED="$FAILED $f"
            else
              cat /tmp/test_out.txt
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Tests failed:$FAILED"
            exit 1
          fi

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Build
        id: build
        continue-on-error: true
        run: set -o pipefail && make NOVA_NO_NET=1 2>&1 | tee build.log

      - name: Report build errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors (Windows)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' build.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Build tools
        if: steps.build.outcome == 'success'
        id: build_tools
        continue-on-error: true
        run: set -o pipefail && make tools NOVA_NO_NET=1 2>&1 | tee tools.log

      - name: Report tools build errors
        if: steps.build_tools.outcome == 'failure'
        run: |
          echo "## Tools Build Errors (Windows)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 tools.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' tools.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Test (skip net + platform-specific)
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: |
          echo "=== Toolchain sanity check ==="
          echo '#include <stdio.h>' > /tmp/hello.c
          echo 'int main(void){puts("TOOLCHAIN_OK");return 0;}' >> /tmp/hello.c
          gcc -static -o /tmp/hello.exe /tmp/hello.c
          /tmp/hello.exe && echo "hello: OK"

          echo "=== Binary info ==="
          ls -la ./bin/nova.exe
          file ./bin/nova.exe

          set +e
          echo "=== PowerShell execution test ==="
          WIN_PATH=$(cygpath -w "$PWD/bin/nova.exe")
          echo "Windows path: $WIN_PATH"
          powershell.exe -Command "
            \$ErrorActionPreference = 'Continue'
            Write-Host 'Attempting to start nova...'
            try {
              \$p = Start-Process -FilePath '$WIN_PATH' -ArgumentList '--version' -Wait -PassThru -NoNewWindow
              Write-Host ('Process ExitCode: ' + \$p.ExitCode)
            } catch {
              Write-Host ('Start-Process error: ' + \$_.Exception.Message)
            }
          " 2>&1
          echo "PS exit: $?"

          echo "=== Direct PowerShell invoke ==="
          powershell.exe -Command "
            & '$WIN_PATH' --version 2>&1
            Write-Host ('LASTEXITCODE: ' + \$LASTEXITCODE)
          " 2>&1
          echo "PS2 exit: $?"

          echo "=== Windows Event Log (last app errors) ==="
          powershell.exe -Command "
            Get-WinEvent -FilterHashtable @{LogName='Application'; Level=1,2,3} -MaxEvents 10 2>\$null |
              Where-Object { \$_.TimeCreated -gt (Get-Date).AddMinutes(-5) } |
              Format-List TimeCreated, Id, Message
          " 2>&1 || echo "no recent events"

          echo "=== Try without LTO: recompile one file ==="
          echo '#include <stdio.h>' > /tmp/ntest.c
          echo 'extern int main(int, char**);' >> /tmp/ntest.c
          # Link Nova objects without LTO to test
          gcc -std=c99 -O2 -DNDEBUG -static -o /tmp/nova_nolto.exe build/*.o build/zorya/*.o -lm 2>&1
          echo "nolto build exit: $?"
          if [ -f /tmp/nova_nolto.exe ]; then
            /tmp/nova_nolto.exe --version 2>&1
            echo "nolto exit: $?"
          fi

          echo "=== Check for stack protector init ==="
          objdump -d ./bin/nova.exe 2>/dev/null | grep -c "__stack_chk" || echo "no stack_chk"
          objdump -t ./bin/nova.exe 2>/dev/null | grep "stack_chk" | head -5 || true

          echo "=== Check CRT entry ==="
          objdump -d ./bin/nova.exe 2>/dev/null | grep -A5 "<__tmainCRTStartup>" | head -10 || true
          objdump -d ./bin/nova.exe 2>/dev/null | grep -A5 "<mainCRTStartup>" | head -10 || true

          set -e
          echo "=== Running tests ==="
          if [ -f ./bin/nova.exe ]; then NOVA=./bin/nova.exe; else NOVA=./bin/nova; fi
          echo "Using: $NOVA"

          FAILED=""
          PASSED=0
          SKIPPED=0
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_net.n) echo "SKIP $f (no-net build)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_os.n) echo "SKIP $f (platform-specific)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_bench_nanbox.n) echo "SKIP $f (known heap-use-after-free)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_package.n|tests/test_require.n) echo "SKIP $f (known module loading issue)"; SKIPPED=$((SKIPPED+1)); continue ;;
            esac
            echo "=== $f ==="
            if ! $NOVA "$f" > /tmp/test_out.txt 2>&1; then
              echo "::error::FAIL $f"
              cat /tmp/test_out.txt
              FAILED="$FAILED $f"
            else
              cat /tmp/test_out.txt
              PASSED=$((PASSED+1))
            fi
          done
          echo "=== Summary: $PASSED passed, $SKIPPED skipped ==="
          if [ -n "$FAILED" ]; then
            echo "::error::Tests failed:$FAILED"
            exit 1
          fi
