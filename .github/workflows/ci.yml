name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build: [release, debug, no-net]
        include:
          - build: release
            make_args: ""
          - build: debug
            make_args: "DEBUG=1"
          - build: no-net
            make_args: "NOVA_NO_NET=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install libcurl (release/debug only)
        if: matrix.build != 'no-net'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build (${{ matrix.build }})
        id: build
        continue-on-error: true
        run: set -o pipefail && make ${{ matrix.make_args }} 2>&1 | tee build.log

      - name: Report build errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors (${{ matrix.build }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' build.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Build tools
        if: steps.build.outcome == 'success'
        id: build_tools
        continue-on-error: true
        run: set -o pipefail && make tools ${{ matrix.make_args }} 2>&1 | tee tools.log

      - name: Report tools build errors
        if: steps.build_tools.outcome == 'failure'
        run: |
          echo "## Tools Build Errors (${{ matrix.build }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 tools.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' tools.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Test
        if: steps.build.outcome == 'success'
        run: |
          FAILED=""
          SKIP_NET=""
          SKIP_ASAN=""
          if [ "${{ matrix.build }}" = "no-net" ]; then SKIP_NET=1; fi
          if [ "${{ matrix.build }}" = "debug" ]; then SKIP_ASAN=1; fi
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_bench_*)
                echo "SKIP $f (benchmark — not a correctness test)"
                continue ;;
              tests/test_net.n)
                if [ -n "$SKIP_NET" ]; then
                  echo "SKIP $f (no-net build)"
                  continue
                fi ;;
              tests/test_package.n|tests/test_require.n)
                if [ -n "$SKIP_ASAN" ]; then
                  echo "SKIP $f (known ASAN issue)"
                  continue
                fi ;;
            esac
            echo "=== $f ==="
            if ! ./bin/nova "$f" > /tmp/test_out.txt 2>&1; then
              echo "::error::FAIL: $f"
              echo "FAIL: $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -20 /tmp/test_out.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat /tmp/test_out.txt
              FAILED="$FAILED $f"
            else
              cat /tmp/test_out.txt
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Tests failed:$FAILED"
            exit 1
          fi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        id: build
        continue-on-error: true
        run: set -o pipefail && make CC=clang NOVA_NO_NET=1 2>&1 | tee build.log

      - name: Report build errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors (macOS)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' build.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Build tools
        if: steps.build.outcome == 'success'
        id: build_tools
        continue-on-error: true
        run: set -o pipefail && make tools CC=clang NOVA_NO_NET=1 2>&1 | tee tools.log

      - name: Report tools build errors
        if: steps.build_tools.outcome == 'failure'
        run: |
          echo "## Tools Build Errors (macOS)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 tools.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' tools.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Test (skip net + platform-specific)
        if: steps.build.outcome == 'success'
        run: |
          FAILED=""
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_bench_*) echo "SKIP $f (benchmark — not a correctness test)"; continue ;;
              tests/test_net.n) echo "SKIP $f (no-net build)"; continue ;;
              tests/test_os.n) echo "SKIP $f (platform-specific: expects Linux paths)"; continue ;;
            esac
            echo "=== $f ==="
            if ! ./bin/nova "$f" > /tmp/test_out.txt 2>&1; then
              echo "::error::FAIL: $f"
              echo "FAIL: $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -20 /tmp/test_out.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat /tmp/test_out.txt
              FAILED="$FAILED $f"
            else
              cat /tmp/test_out.txt
            fi
          done
          if [ -n "$FAILED" ]; then
            echo "::error::Tests failed:$FAILED"
            exit 1
          fi

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc make

      - name: Build
        id: build
        continue-on-error: true
        run: set -o pipefail && make NOVA_NO_NET=1 2>&1 | tee build.log

      - name: Report build errors
        if: steps.build.outcome == 'failure'
        run: |
          echo "## Build Errors (Windows)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' build.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Build tools
        if: steps.build.outcome == 'success'
        id: build_tools
        continue-on-error: true
        run: set -o pipefail && make tools NOVA_NO_NET=1 2>&1 | tee tools.log

      - name: Report tools build errors
        if: steps.build_tools.outcome == 'failure'
        run: |
          echo "## Tools Build Errors (Windows)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 tools.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'error:|Error:' tools.log | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          exit 1

      - name: Test (skip net + platform-specific)
        if: steps.build.outcome == 'success'
        run: |
          if [ -f ./bin/nova.exe ]; then NOVA=./bin/nova.exe; else NOVA=./bin/nova; fi
          echo "Using: $NOVA"
          $NOVA --version

          FAILED=""
          PASSED=0
          SKIPPED=0
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_bench_*) echo "SKIP $f (benchmark — not a correctness test)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_net.n) echo "SKIP $f (no-net build)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_os.n) echo "SKIP $f (platform-specific)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_package.n|tests/test_require.n) echo "SKIP $f (known module loading issue)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_tools.n) echo "SKIP $f (POSIX-specific tool operations)"; SKIPPED=$((SKIPPED+1)); continue ;;
              tests/test_fs.n) echo "SKIP $f (expects Unix path separators)"; SKIPPED=$((SKIPPED+1)); continue ;;
            esac
            echo "=== $f ==="
            if ! $NOVA "$f" > /tmp/test_out.txt 2>&1; then
              echo "::error::FAIL $f"
              echo "FAIL: $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -20 /tmp/test_out.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              cat /tmp/test_out.txt
              FAILED="$FAILED $f"
            else
              cat /tmp/test_out.txt
              PASSED=$((PASSED+1))
            fi
          done
          echo "=== Summary: $PASSED passed, $SKIPPED skipped ==="
          if [ -n "$FAILED" ]; then
            echo "::error::Tests failed:$FAILED"
            exit 1
          fi
