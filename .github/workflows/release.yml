name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            cc: gcc
            artifact: nova-linux-x86_64
            ext: ""
            net: true
          - os: macos-latest
            name: macos-arm64
            cc: clang
            artifact: nova-macos-arm64
            ext: ""
            net: false
          - os: windows-latest
            name: windows-x86_64
            cc: gcc
            artifact: nova-windows-x86_64
            ext: ".exe"
            net: false

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.os == 'windows-latest' && 'msys2 {0}' || 'bash' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: mingw-w64-ucrt-x86_64-gcc make tar gzip

      - name: Install libcurl (Linux)
        if: matrix.net
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build release
        run: |
          if [ "${{ matrix.net }}" = "true" ]; then
            make CC=${{ matrix.cc }}
          else
            make CC=${{ matrix.cc }} NOVA_NO_NET=1
          fi

      - name: Build tools
        run: make tools CC=${{ matrix.cc }}

      - name: Run tests
        run: |
          for f in tests/test_*.n; do
            case "$f" in
              tests/test_net.n)
                if [ "${{ matrix.net }}" != "true" ]; then
                  echo "SKIP $f (no-net build)"
                  continue
                fi
                ;;
            esac
            echo "=== $f ==="
            ./bin/nova "$f" || exit 1
          done

      - name: Read version
        id: version
        run: echo "ver=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          mkdir -p dist/${{ matrix.artifact }}/tools
          cp bin/nova${{ matrix.ext }} dist/${{ matrix.artifact }}/
          if [ -d bin/tools ]; then
            cp bin/tools/*${{ matrix.ext }} dist/${{ matrix.artifact }}/tools/ 2>/dev/null || true
          fi
          cp LICENSE README.md dist/${{ matrix.artifact }}/
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "ver=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Nova v${{ steps.version.outputs.ver }}
          body: |
            ## Nova v${{ steps.version.outputs.ver }}

            A register-based bytecode virtual machine with a dynamically-typed scripting language, built-in CLI tools, NINI task runner, and NDP data processing.

            ### Installation

            Download the archive for your platform, extract, and add to your PATH:

            ```bash
            tar xzf nova-linux-x86_64.tar.gz
            sudo cp nova-linux-x86_64/nova /usr/local/bin/
            sudo mkdir -p /usr/local/lib/nova/tools
            sudo cp nova-linux-x86_64/tools/* /usr/local/lib/nova/tools/
            ```

            Or build from source:

            ```bash
            git clone https://github.com/zorya-corporation/nova.git
            cd nova && make && make tools
            sudo make install
            ```

            ### Downloads

            | Platform | Archive | Notes |
            |----------|---------|-------|
            | Linux x86_64 | `nova-linux-x86_64.tar.gz` | Full build with networking |
            | macOS ARM64 | `nova-macos-arm64.tar.gz` | No networking (no libcurl) |
            | Windows x86_64 | `nova-windows-x86_64.tar.gz` | No networking (no libcurl) |

            Each archive contains the `nova` binary, standalone tool binaries (`tools/`), LICENSE, and README.

            ### What's Included

            - Nova interpreter and compiler
            - 11 standalone CLI tools (ncat, nls, ntree, nfind, ngrep, nhead, ntail, nwc, nwrite, necho, npwd)
            - Interactive tool shell
            - NINI task runner
            - NDP multi-format data processing (JSON, CSV, NINI, INI, TOML, HTML, YAML)
            - Full standard library (math, string, table, io, os, fs, coroutine, async, debug, nlp)

            See [README.md](https://github.com/zorya-corporation/nova/blob/main/README.md) for documentation.
          files: |
            artifacts/nova-linux-x86_64/nova-linux-x86_64.tar.gz
            artifacts/nova-macos-arm64/nova-macos-arm64.tar.gz
            artifacts/nova-windows-x86_64/nova-windows-x86_64.tar.gz
          draft: false
          prerelease: false
