name: Bug Report
description: Report a bug or unexpected behavior in Nova
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as completely as possible.

  - type: input
    id: nova-version
    attributes:
      label: Nova Version
      description: Run `nova --version` to get the version string.
      placeholder: "e.g. Nova 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux (x86_64)
        - Linux (ARM64)
        - macOS (x86_64)
        - macOS (Apple Silicon)
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: compiler
    attributes:
      label: C Compiler & Version
      description: e.g. GCC 15.2.1, Clang 18.0
      placeholder: "gcc --version"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce-script
    attributes:
      label: Minimal Reproducing Script
      description: |
        A minimal `.n` Nova script that reproduces the issue.
        This will be automatically formatted as Nova code.
      render: lua
      placeholder: |
        -- Minimal script that triggers the bug
        local x = ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (e.g. related issues, workarounds tried).
